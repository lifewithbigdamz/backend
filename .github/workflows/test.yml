name: Vesting API Tests

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      sqlite:
        image: keinos/sqlite3:latest
        options: >-
          --health-cmd "sqlite3 --version"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Create environment file
        run: cp .env.example .env
        
      - name: Create data directory
        run: mkdir -p data
        
      - name: Run unit tests
        run: npm test
        
      - name: Run RBAC tests specifically
        run: npm test -- --testPathPattern=rbac
        
      - name: Generate coverage report
        run: npm run test:coverage
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  rbac-security-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Create environment file
        run: cp .env.example .env
        
      - name: Create data directory
        run: mkdir -p data
        
      - name: Start application in background
        run: |
          npm start &
          sleep 10
        
      - name: Test RBAC endpoints
        run: |
          # Test token generation for all roles
          curl -X POST http://localhost:3000/api/auth/token/generate \
            -H "Content-Type: application/json" \
            -d '{"id":"test-super","email":"super@test.com","role":"super_admin"}' \
            || exit 1
            
          curl -X POST http://localhost:3000/api/auth/token/generate \
            -H "Content-Type: application/json" \
            -d '{"id":"test-finance","email":"finance@test.com","role":"finance_manager"}' \
            || exit 1
            
          curl -X POST http://localhost:3000/api/auth/token/generate \
            -H "Content-Type: application/json" \
            -d '{"id":"test-hr","email":"hr@test.com","role":"hr_manager"}' \
            || exit 1
            
          curl -X POST http://localhost:3000/api/auth/token/generate \
            -H "Content-Type: application/json" \
            -d '{"id":"test-auditor","email":"auditor@test.com","role":"read_only_auditor"}' \
            || exit 1
        
      - name: Cleanup
        run: pkill -f "node index.js" || true

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: |
          npm install -g eslint
          eslint . --ext .js || true
        continue-on-error: true
